name: Publish Tauri Releases

# The shared toolchain/dependency setup lives in .github/actions/setup-whispering-build
# so this release workflow and pr-preview.whispering.yml configure the build identically.
# Only the build, signing, and release-publishing steps differ and stay below.

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v7.0.0
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release (e.g., v7.9.0)'
        required: true
        type: string

jobs:
  # tauri-action (below) overwrites same-named assets after each successful
  # build, so re-running a release replaces its assets in place. We deliberately
  # do NOT pre-delete assets in a separate job: that would strand the release
  # with zero downloads if any later build step (e.g. notarization) failed.
  publish-tauri:
    # Required permissions to create releases and upload assets
    permissions:
      contents: write

    # Build strategy: create separate jobs for each platform
    strategy:
      fail-fast: false  # Continue building other platforms even if one fails
      matrix:
        include:
          # macOS Apple Silicon (M1, M2, M3, etc.)
          - platform: 'blacksmith-6vcpu-macos-15'
            os: 'macos'
            tauriArgs: '--target aarch64-apple-darwin'
            rustTargets: 'aarch64-apple-darwin'

          # Linux on Blacksmith: GA drop-in runner, same base image as GitHub-hosted
          # ubuntu-24.04. `os: 'linux'` still drives every linux-specific setup step.
          - platform: 'blacksmith-8vcpu-ubuntu-2404'
            os: 'linux'
            tauriArgs: ''  # No specific target needed for Linux
            rustTargets: ''

          # Windows on github-hosted windows-latest. Preview already builds Windows
          # on Blacksmith; release stays here until that has run green across more
          # PRs and a Blacksmith-built installer is manually confirmed to record and
          # transcribe. Moving this to blacksmith-*-windows-* auto-engages the LLVM
          # install in the setup action.
          - platform: 'windows-latest'
            os: 'windows'
            tauriArgs: ''  # No specific target needed for Windows
            rustTargets: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # Referenced as owner/repo/...@main (not ./) so the action resolves from the
      # default branch no matter which tag this job checks out. A local ./ action
      # would be read from the checked-out tag's tree, which breaks re-releasing
      # any tag that predates this action and changes the existing semantics
      # (workflow_dispatch already runs the default branch's setup, not the tag's).
      # Preview uses ./ instead, so a PR tests its own edits to this action.
      - name: Setup Whispering build
        uses: EpicenterHQ/epicenter/.github/actions/setup-whispering-build@main
        with:
          os: ${{ matrix.os }}
          rust-targets: ${{ matrix.rustTargets }}
          windows-runner: ${{ matrix.platform }}

      # Read and process release notes from the release-notes directory
      - name: Process release notes
        id: release_notes
        shell: bash
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          # Look for release notes file matching the tag name (e.g., v7.0.0 -> docs/release-notes/v7.0.0.md)
          RELEASE_FILE="docs/release-notes/$TAG.md"

          if [ -f "$RELEASE_FILE" ]; then
            echo "Found release notes file: $RELEASE_FILE"
            RELEASE_NOTES=$(cat "$RELEASE_FILE")
          else
            echo "No release notes file found at $RELEASE_FILE, using fallback"
            RELEASE_NOTES="Whispering $TAG is now available. Check GitHub for the full changelog."
          fi

          # Use random delimiter to prevent injection via release notes content
          DELIMITER=$(openssl rand -hex 8)
          {
            echo "RELEASE_NOTES<<${DELIMITER}"
            echo "$RELEASE_NOTES"
            echo "${DELIMITER}"
          } >> $GITHUB_OUTPUT

      # Main Tauri build and release action
      - id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          # Set CI environment variable to help with DMG bundling
          CI: true

          # Required: GitHub token for creating releases and uploading assets
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Aptabase analytics key
          APTABASE_KEY: ${{ secrets.APTABASE_KEY }}

          # Allows vendored native projects with old CMake policy floors to configure on CMake 4.
          CMAKE_POLICY_VERSION_MINIMUM: '3.5'

          # Tauri code signing (optional but recommended)
          # These enable automatic updates without security warnings
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

          # macOS code signing and notarization (required for distribution)
          # Without these, macOS users will see security warnings
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}  # App-specific password
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

        with:
          # Path to the Tauri project (where tauri.conf.json is located)
          projectPath: 'apps/whispering'

          # Use the actual git tag as the release tag (e.g., v7.0.0)
          tagName: ${{ github.event.inputs.tag || github.ref_name }}

          # Release title shown on GitHub
          releaseName: 'Whispering ${{ github.event.inputs.tag || github.ref_name }}'

          # Release description from our processed release notes
          # Full release notes for GitHub release page
          releaseBody: ${{ steps.release_notes.outputs.RELEASE_NOTES }}

          # Create as draft so you can review before publishing
          releaseDraft: true

          # Set to false for beta/RC releases
          prerelease: false

          # Platform-specific build arguments (e.g., --target for macOS)
          args: ${{ matrix.tauriArgs }}

      # tauri-action notarizes and staples the .app but only signs the .dmg it
      # wraps around it afterwards, so the downloaded .dmg is "Unnotarized
      # Developer ID" and fails Gatekeeper's open assessment. This notarizes,
      # staples, and verifies the .dmg itself, then replaces the draft's asset
      # with the stapled copy before anyone can publish or download it. The
      # release id and upload URL come from the tauri-build step's outputs so the
      # asset swap addresses the draft directly instead of resolving it by tag.
      # @main rather than ./ for the same reason as the setup action above.
      - name: Notarize Whispering DMG (macOS only)
        if: ${{ matrix.os == 'macos' }}
        uses: EpicenterHQ/epicenter/.github/actions/notarize-whispering-dmg@main
        with:
          apple-id: ${{ secrets.APPLE_ID }}
          apple-password: ${{ secrets.APPLE_PASSWORD }}
          apple-team-id: ${{ secrets.APPLE_TEAM_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          release-id: ${{ steps.tauri-build.outputs.releaseId }}
          upload-url: ${{ steps.tauri-build.outputs.releaseUploadUrl }}

      # @main rather than ./ for the same reason as the setup action above.
      - name: Process AppImage (Linux only)
        if: ${{ matrix.os == 'linux' }}
        uses: EpicenterHQ/epicenter/.github/actions/process-whispering-appimage@main
