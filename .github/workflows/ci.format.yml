name: Code quality

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: 'package.json'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint check
        run: bun run lint:check
      - name: Type check
        run: bun run typecheck
      # Rejects backtick-wrapped apps/** and packages/** file paths in living
      # docs that no longer resolve. Excludes specs, articles, skills, agent
      # prompts, and Historical-marked docs. See scripts/check-doc-paths.ts.
      - name: Check doc file references
        run: bun run check:doc-paths
      # Rejects specs that declare a terminal status (a finished spec should be
      # harvested into docs/adr/ and deleted, not left in the tree) and Proposed
      # ADRs orphaned by a deleted spec. A backstop for the gate the agent also
      # runs in spec-execution Phase 4. See scripts/check-doc-hygiene.ts.
      - name: Check doc hygiene
        run: bun run check:doc-hygiene
      # Rejects floating specs (latest, *, dist-tags) in the bun catalog. A
      # catalog entry IS the version pin; a floating one reintroduces lockfile
      # drift that only surfaces as a frozen-install failure here, days later,
      # on whoever opens the next PR. See scripts/check-catalog-pins.ts.
      - name: Check catalog pins
        run: bun run check:catalog-pins
      # The Biome plugin at scripts/biome/c-json-errors.grit rejects ad-hoc
      # c.json({ ... }, 4xx/5xx) error literals as part of `bun run lint:check`
      # above; no separate step is needed. See
      # specs/20260524T100110-centralize-c-json-error-responses.md.
      - name: Reject hardcoded API path literals
        # Every wire URL path Epicenter serves or calls lives in one
        # place: packages/constants/src/{api,oauth}-routes.ts. Consumers
        # import patterns + URL builders from there. See
        # specs/20260524T153612-centralize-route-paths.md.
        #
        # Excludes (per spec § Decisions Log):
        #   - The constants files themselves (they ARE the source of truth).
        #   - Vendored mirrors that intentionally re-declare these paths to
        #     avoid a runtime dependency on @epicenter/constants
        #     (packages/sync/src/room-route.ts, packages/auth/src/routes.ts).
        #   - *.test.ts / *.test.tsx (mock URL matchers are allowed to
        #     reference paths verbatim).
        #   - JSDoc/comment lines (descriptive prose, not constructions).
        run: |
          if grep -rEn --include='*.ts' --include='*.tsx' \
              --exclude='*.test.ts' --exclude='*.test.tsx' \
              --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.wrangler --exclude-dir=.next \
              "['\"\`]/api/(session|owners|ai)([^a-z]|$)|['\"\`]/auth/(oauth2/[a-z]+|cli-callback)" \
              packages apps \
              | grep -vE "packages/constants/src/(api|oauth)-routes\.ts|packages/sync/src/room-route\.ts|packages/auth/src/routes\.ts|packages/server/src/auth-pages/scripts/" \
              | grep -vE "^[^:]+:[0-9]+:[[:space:]]*(\*|//|/\*)" ; then
            echo "::error::Hardcoded API path literal found. Use API_ROUTES.* from @epicenter/constants/api-routes or OAUTH_ROUTES.* from @epicenter/constants/oauth-routes instead."
            exit 1
          fi
