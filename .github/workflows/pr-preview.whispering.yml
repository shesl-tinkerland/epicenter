name: PR Preview Builds

# This workflow builds Tauri applications for all platforms when a PR is opened or updated.
# It automatically cancels previous builds to save CI minutes in two scenarios:
#
# 1. When new commits are pushed to the PR (synchronize event):
#    - Cancels the previous build for the same PR
#    - Starts a new build with the latest code
#
# 2. When the PR is merged or closed:
#    - Cancels any in-progress builds for that PR
#    - Runs a lightweight job that triggers the cancellation via concurrency groups
#
# How it works:
# - All workflow runs for the same PR share the same concurrency group (keyed by PR number)
# - When a new run starts, GitHub Actions automatically cancels previous runs in that group
# - The 'closed' trigger activates a fast dummy job that joins the concurrency group and triggers cancellation
# - A cheap changed-files job decides whether the expensive 3-platform build is needed

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  # Group all runs for the same PR together
  # When a new run starts, previous runs in this group are automatically cancelled
  group: tauri-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Lightweight job that runs when PR is closed/merged
  # Purpose: Trigger concurrency-based cancellation of in-progress builds
  # This job starts quickly, joins the concurrency group, and causes GitHub to cancel
  # any running builds for this PR, saving CI minutes
  cancel-on-close:
    if: github.event.action == 'closed'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - run: echo "PR closed - cancelling in-progress builds via concurrency group"

  changes:
    if: github.event.action != 'closed'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      pull-requests: read
    outputs:
      build_preview: ${{ steps.changed_files.outputs.build_preview }}
    steps:
      - name: Check changed files
        id: changed_files
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          files=$(gh api "repos/$REPOSITORY/pulls/$PR_NUMBER/files" --paginate --jq '.[].filename')

          if echo "$files" | grep -Eq '^(apps/whispering/|packages/|\.github/workflows/pr-preview\.whispering\.yml$)'; then
            echo "build_preview=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_preview=false" >> "$GITHUB_OUTPUT"
          fi

  # Main build job - runs on PR open and updates, skipped when PR is closed
  build-preview:
    needs: changes
    if: github.event.action != 'closed' && needs.changes.outputs.build_preview == 'true'
    permissions:
      contents: read
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'blacksmith-6vcpu-macos-15'
            os: 'macos'
            tauriArgs: '--target aarch64-apple-darwin'
            artifactSuffix: 'macos-arm64'
            rustTargets: 'aarch64-apple-darwin'

          # macOS Intel (x86_64) PREVIEW-ONLY spike: cross-compiled from the Apple
          # Silicon runner above. Neither Microsoft nor pyke publishes a prebuilt
          # x86_64 macOS ONNX Runtime, so the ORT step below temporarily pulls a
          # community build from Handy's blob purely to prove the cross-compile +
          # dylib-bundle pipeline. Do NOT copy this row into release.whispering.yml
          # until we host our own x86_64 ORT build (the third-party blob is not a
          # durable release dependency).
          - platform: 'blacksmith-6vcpu-macos-15'
            os: 'macos'
            tauriArgs: '--target x86_64-apple-darwin'
            artifactSuffix: 'macos-intel'
            rustTargets: 'x86_64-apple-darwin'

          # Linux on Blacksmith: GA drop-in runner, same base image as GitHub-hosted
          # ubuntu-24.04. `os: 'linux'` still drives every apt/Vulkan/FUSE step.
          - platform: 'blacksmith-8vcpu-ubuntu-2404'
            os: 'linux'
            tauriArgs: ''
            artifactSuffix: 'linux'
            rustTargets: ''

          - platform: 'windows-latest'
            os: 'windows'
            tauriArgs: ''
            artifactSuffix: 'windows'
            rustTargets: ''

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Install create-dmg (macOS only)
        if: ${{ matrix.os == 'macos' }}
        run: brew install create-dmg

      - name: install dependencies (ubuntu only)
        if: ${{ matrix.os == 'linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev libasound2-dev libopenblas-dev libx11-dev libxtst-dev libxrandr-dev

      # Linux Vulkan SDK installation (required for whisper-cpp GPU acceleration on Linux)
      - name: Install Vulkan SDK (Ubuntu)
        if: ${{ matrix.os == 'linux' }}
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-1.3.290-noble.list https://packages.lunarg.com/vulkan/1.3.290/lunarg-vulkan-1.3.290-noble.list
          sudo apt update
          sudo apt install -y vulkan-sdk mesa-vulkan-drivers

      - name: Install Vulkan SDK (Windows)
        if: ${{ matrix.os == 'windows' }}
        shell: pwsh
        env:
          VULKAN_SDK_VERSION: 1.3.290.0
        run: |
          $installer = Join-Path $env:RUNNER_TEMP "VulkanSDK-$env:VULKAN_SDK_VERSION.exe"
          Invoke-WebRequest "https://sdk.lunarg.com/sdk/download/$env:VULKAN_SDK_VERSION/windows/VulkanSDK-$env:VULKAN_SDK_VERSION-Installer.exe" -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait
          "VULKAN_SDK=C:\VulkanSDK\$env:VULKAN_SDK_VERSION" >> $env:GITHUB_ENV
          "C:\VulkanSDK\$env:VULKAN_SDK_VERSION\Bin" >> $env:GITHUB_PATH

      - name: Setup MSVC developer command prompt (Windows)
        if: ${{ matrix.os == 'windows' }}
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure Windows native build
        if: ${{ matrix.os == 'windows' }}
        shell: pwsh
        run: |
          $drive = Split-Path -Qualifier $env:GITHUB_WORKSPACE
          $targetDir = Join-Path $drive "t"
          New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
          "CARGO_TARGET_DIR=$targetDir" >> $env:GITHUB_ENV

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/whispering/src-tauri -> target'
          # Windows redirects CARGO_TARGET_DIR to a short drive-root path outside this workspace.
          cache-targets: ${{ matrix.os != 'windows' }}

      - name: install frontend dependencies
        run: bun install

      - name: Build frontend
        run: bun --filter @epicenter/whispering build

      # macOS Intel only: provision a dynamically linked x86_64 ONNX Runtime and
      # bundle it into the .app. The `ort` crate (2.0.0-rc.12, via transcribe-rs)
      # targets ONNX Runtime 1.24.2, but no official x86_64 macOS build exists, so
      # this pulls a community build. ORT_LIB_LOCATION + ORT_PREFER_DYNAMIC_LINK
      # make ort-sys link against it dynamically; the jq patch embeds the dylib in
      # the bundle so it resolves at runtime. PREVIEW-ONLY: replace the blob source
      # before any release use.
      - name: Provision x86_64 ONNX Runtime (macOS Intel only)
        if: ${{ matrix.artifactSuffix == 'macos-intel' }}
        shell: bash
        run: |
          ORT_VERSION="1.24.2"
          curl -fSL -o ort.tgz "https://blob.handy.computer/onnxruntime-osx-x86_64-${ORT_VERSION}.tgz"
          tar xzf ort.tgz
          ORT_DIR="$PWD/onnxruntime-osx-x86_64-${ORT_VERSION}"
          echo "ORT_LIB_LOCATION=$ORT_DIR/lib" >> "$GITHUB_ENV"
          echo "ORT_PREFER_DYNAMIC_LINK=1" >> "$GITHUB_ENV"
          DYLIB="$ORT_DIR/lib/libonnxruntime.${ORT_VERSION}.dylib"
          test -f "$DYLIB" || { echo "::error::expected dylib not found: $DYLIB"; ls -la "$ORT_DIR/lib"; exit 1; }
          file "$DYLIB"
          CONF="apps/whispering/src-tauri/tauri.conf.json"
          jq --arg lib "$DYLIB" '.bundle.macOS.frameworks = [$lib]' "$CONF" > "$CONF.tmp" && mv "$CONF.tmp" "$CONF"

      # Preview builds are unsigned: --no-sign skips Apple codesigning,
      # Windows Authenticode, and Tauri updater signing. All bundle artifacts
      # (.dmg, .AppImage, .deb, .msi, .exe) are still produced normally.
      # This avoids exposing signing secrets in PR workflows (especially forks).
      - uses: tauri-apps/tauri-action@v0
        env:
          CI: true
          APTABASE_KEY: ${{ secrets.APTABASE_KEY }}
          CMAKE_POLICY_VERSION_MINIMUM: '3.5'
        with:
          projectPath: 'apps/whispering'
          tagName: ''
          args: '${{ matrix.tauriArgs }} --no-sign'

      # macOS Intel only: confirm the build is actually x86_64 and that the
      # onnxruntime dylib is both linked and bundled into the .app. Fails loudly
      # if the cross-compile silently produced an arm64 binary or dropped the dylib.
      - name: Verify x86_64 build and ONNX Runtime bundling (macOS Intel only)
        if: ${{ matrix.artifactSuffix == 'macos-intel' }}
        shell: bash
        run: |
          APP=$(find apps/whispering/src-tauri/target/x86_64-apple-darwin/release/bundle -name '*.app' -type d | head -1)
          test -n "$APP" || { echo "::error::no .app bundle found for x86_64-apple-darwin"; exit 1; }
          # Tauri names the executable after productName ("Whispering"), not the crate.
          BIN="$APP/Contents/MacOS/Whispering"
          echo "Binary architecture:"; file "$BIN"
          file "$BIN" | grep -q 'x86_64' || { echo "::error::binary is not x86_64"; exit 1; }
          echo "Frameworks bundled:"; ls -la "$APP/Contents/Frameworks/" || true
          echo "onnxruntime linkage:"; otool -L "$BIN" | grep -i onnxruntime || { echo "::error::binary not linked against onnxruntime"; exit 1; }
          ls "$APP/Contents/Frameworks/" | grep -qi onnxruntime || { echo "::error::onnxruntime dylib missing from Frameworks/"; exit 1; }
          echo "macOS Intel ONNX Runtime bundling verified."

      - name: Copy Windows artifacts into workspace
        if: ${{ matrix.os == 'windows' }}
        shell: pwsh
        run: |
          $bundleDir = Join-Path $env:CARGO_TARGET_DIR "release\bundle"
          $workspaceBundleDir = Join-Path $env:GITHUB_WORKSPACE "target\release\bundle"
          New-Item -ItemType Directory -Force -Path $workspaceBundleDir | Out-Null
          Copy-Item -Path (Join-Path $bundleDir "*") -Destination $workspaceBundleDir -Recurse -Force

      - name: Install FUSE for AppImage processing
        if: ${{ matrix.os == 'linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2

      - name: Remove libwayland-client.so from AppImage
        if: ${{ matrix.os == 'linux' }}
        run: |
          APPIMAGE_PATH=$(find apps/whispering/src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)

          if [ -n "$APPIMAGE_PATH" ]; then
            echo "Processing AppImage: $APPIMAGE_PATH"
            chmod +x "$APPIMAGE_PATH"
            cd "$(dirname "$APPIMAGE_PATH")"
            APPIMAGE_NAME=$(basename "$APPIMAGE_PATH")
            "./$APPIMAGE_NAME" --appimage-extract

            echo "Removing libwayland-client.so files..."
            find squashfs-root -name "libwayland-client.so*" -type f -delete

            echo "Files remaining in lib directories:"
            find squashfs-root -name "lib*" -type d | head -5 | while read dir; do
              echo "Contents of $dir:"
              ls "$dir" | grep -E "(wayland|fuse)" || echo "  No wayland/fuse libraries found"
            done

            wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
            chmod +x appimagetool-x86_64.AppImage
            ARCH=x86_64 ./appimagetool-x86_64.AppImage --no-appstream squashfs-root "$APPIMAGE_NAME"
            rm -rf squashfs-root appimagetool-x86_64.AppImage

            echo "libwayland-client.so removed from AppImage successfully"
          else
            echo "No AppImage found to process"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: whispering-pr${{ github.event.pull_request.number }}-${{ matrix.artifactSuffix }}
          path: |
            apps/whispering/src-tauri/target/*/release/bundle/**/*.dmg
            apps/whispering/src-tauri/target/*/release/bundle/**/*.app
            apps/whispering/src-tauri/target/release/bundle/**/*.dmg
            apps/whispering/src-tauri/target/release/bundle/**/*.app
            apps/whispering/src-tauri/target/release/bundle/**/*.AppImage
            apps/whispering/src-tauri/target/release/bundle/**/*.deb
            apps/whispering/src-tauri/target/release/bundle/**/*.exe
            apps/whispering/src-tauri/target/release/bundle/**/*.msi
            target/release/bundle/**/*.exe
            target/release/bundle/**/*.msi
          if-no-files-found: warn
          retention-days: 7
